services:
  n8n:
    image: n8nio/n8n:latest
    container_name: gensyncai_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_BLOCK_NODES=
      - N8N_ENABLE_EXECUTE_COMMAND=true
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - GENERIC_TIMEZONE=Asia/Kolkata
      - OPENAI_API_KEY=your_api_key_here
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock # Allows n8n to control the LaTeX container
    user: root # Essential for docker socket permissions

  latex:
    image: blang/latex:ctanfull
    container_name: gensyncai_latex
    restart: always
    volumes:
      - ./workspace:/workspace
    working_dir: /workspace

volumes:
  n8n_data:
